{# Vertical settings navigation. `active` is the current section key:
   auth | smtp | alerts | events | policy | roles | users | api-keys #}
{% macro settings_nav(active) %}
<nav class="cw-settings-nav" aria-label="Settings sections">
  <a href="/settings?tab=auth" class="{% if active == 'auth' %}active{% endif %}">Authentication</a>
  <a href="/settings?tab=smtp" class="{% if active == 'smtp' %}active{% endif %}">SMTP</a>
  <a href="/settings?tab=alerts" class="{% if active == 'alerts' %}active{% endif %}">Alerts</a>
  <a href="/settings/events" class="{% if active == 'events' %}active{% endif %}">Events</a>
  <a href="/settings?tab=policy" class="{% if active == 'policy' %}active{% endif %}">Policy</a>
  <a href="/settings/roles" class="{% if active == 'roles' %}active{% endif %}">Roles</a>
  <a href="/settings/users" class="{% if active == 'users' %}active{% endif %}">Users</a>
  <a href="/settings?tab=api-keys" class="{% if active == 'api-keys' %}active{% endif %}" data-testid="settings-api-keys-link">API keys</a>
</nav>
{% endmacro %}
