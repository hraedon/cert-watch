apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-watch
  namespace: cert-watch
  labels:
    app.kubernetes.io/name: cert-watch
    app.kubernetes.io/component: web
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-watch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-watch
        app.kubernetes.io/component: web
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - cert-watch
                topologyKey: kubernetes.io/hostname
      containers:
        - name: cert-watch
          image: cert-watch:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cert-watch-config
          env:
            # Sensitive SMTP credentials from secrets
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: cert-watch-secrets
                  key: smtp-host
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: cert-watch-secrets
                  key: smtp-user
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cert-watch-secrets
                  key: smtp-password
                  optional: true
            - name: SMTP_FROM_ADDR
              valueFrom:
                secretKeyRef:
                  name: cert-watch-secrets
                  key: smtp-from-addr
                  optional: true
            - name: ALERT_RECIPIENTS
              valueFrom:
                secretKeyRef:
                  name: cert-watch-secrets
                  key: alert-recipients
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /app/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cert-watch-data
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
