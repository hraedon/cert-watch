apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cert-watch

resources:
  - namespace.yaml
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml

commonLabels:
  app.kubernetes.io/name: cert-watch
  app.kubernetes.io/managed-by: kustomize

