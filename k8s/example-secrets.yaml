# Example secrets template - DO NOT COMMIT WITH REAL VALUES
#
# Create a real secret with:
#   kubectl create secret generic cert-watch-secrets \
#     --from-literal=smtp-host='smtp.example.com' \
#     --from-literal=smtp-user='alerts@example.com' \
#     --from-literal=smtp-password='your-password' \
#     --from-literal=smtp-from-addr='alerts@example.com' \
#     --from-literal=alert-recipients='admin@example.com,ops@example.com' \
#     -n cert-watch
#
# Or use external secret management (Vault, Sealed Secrets, etc.)

apiVersion: v1
kind: Secret
metadata:
  name: cert-watch-secrets
  namespace: cert-watch
  labels:
    app.kubernetes.io/name: cert-watch
type: Opaque
stringData:
  smtp-host: ""
  smtp-user: ""
  smtp-password: ""
  smtp-from-addr: ""
  alert-recipients: ""
