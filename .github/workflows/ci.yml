name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
      # Include the auth extras so the LDAP/OAuth providers are exercised (and
      # counted toward coverage) in CI, not just skipped for want of authlib/ldap3.
      - run: uv pip install -e ".[dev,auth]"
      - name: pip-audit
        run: |
          # Audit the third-party dependency closure. Snapshot it before
          # installing pip-audit (so the audit tool's own deps aren't included)
          # and drop cert-watch itself — it's an unpublished editable install
          # (rendered by uv as an `-e file://…/cert-watch` line), which --strict
          # would otherwise fail on ("not found on PyPI").
          uv pip freeze | grep -v 'cert-watch' > /tmp/audit-reqs.txt
          uv pip install pip-audit
          .venv/bin/pip-audit --strict --requirement /tmp/audit-reqs.txt
      - name: ruff
        run: .venv/bin/ruff check .
      - name: mypy
        # Gated now that the tree is at zero errors (BC-093 / BC-146). Config
        # lives in [tool.mypy] in pyproject.toml.
        run: .venv/bin/mypy src/cert_watch
      - name: djlint
        # Template linting (BC-143).  Ignore style conventions that are
        # intentional in this project (inline styles, hardcoded URLs, bare
        # endblocks, entity references, spaceless tags inside attributes).
        run: |
          .venv/bin/djlint src/cert_watch/templates/ --lint \
            --ignore=T003,J004,J018,T028,H021,H023,H030,H031
      - name: pytest
        # COVERAGE_CORE=sysmon uses the faster sys.monitoring coverage core
        # (Python 3.12+). Parallelism (`-n auto`) comes from addopts in pyproject.
        env:
          COVERAGE_CORE: sysmon
        run: .venv/bin/pytest -q --ignore=tests/e2e --ignore=tests/integration

  ldap-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
      - run: uv pip install -e ".[dev,auth]"
      - name: pytest (integration)
        # Container-bound tests: no coverage, single-threaded, --no-cov mirrors
        # the e2e job convention.
        run: .venv/bin/pytest -m integration tests/integration -q --no-cov -n0
