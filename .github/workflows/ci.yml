name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - name: ruff
        run: .venv/bin/ruff check .
      - name: pytest
        run: .venv/bin/pytest -q
