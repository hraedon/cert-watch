name: deploy-smoke
on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: deploy-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the smoke image once and share it with the deploy jobs, so all three
  # exercise the same bits and we do not pay for three identical builds.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build image
        run: |
          docker build \
            --build-arg GIT_TAG=0.0.0-smoke \
            --build-arg GIT_COMMIT=smoke \
            -t cert-watch-deploy-test:smoke .
          docker save cert-watch-deploy-test:smoke -o /tmp/cw-image.tar
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cw-image
          path: /tmp/cw-image.tar
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cw-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/cw-image.tar

      - name: Run container
        run: |
          docker run -d --name cw-smoke \
            -p 127.0.0.1:18888:8000 \
            -e CERT_WATCH_HOST=127.0.0.1 \
            -e CERT_WATCH_ALLOW_UNAUTH=1 \
            cert-watch-deploy-test:smoke

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18888/healthz | grep -q '"ok"'; then
              echo "healthz OK"
              exit 0
            fi
            sleep 2
          done
          echo "healthz never returned OK"
          docker logs cw-smoke
          exit 1

      - name: Verify /readyz
        run: |
          for i in $(seq 1 30); do
            body=$(curl -sf http://127.0.0.1:18888/readyz)
            if echo "$body" | grep -q '"database".*"ok"'; then
              echo "readyz OK: $body"
              exit 0
            fi
            sleep 2
          done
          echo "readyz never reported healthy"
          docker logs cw-smoke
          exit 1

      - name: Docker HEALTHCHECK
        run: |
          for i in $(seq 1 18); do
            status=$(docker inspect --format '{{.State.Health.Status}}' cw-smoke)
            if [ "$status" = "healthy" ]; then
              echo "Docker healthcheck: $status"
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "Docker healthcheck: UNHEALTHY"
              docker logs cw-smoke
              exit 1
            fi
            sleep 5
          done
          echo "Docker healthcheck never reached healthy"
          docker logs cw-smoke
          exit 1

      # Structured, agent-friendly assertion using the same verifier operators
      # run by hand. The waits above gate on startup timing; this is the gate of
      # record -- it emits verify-docker.json (printed via --json) and exits
      # non-zero on any failed check, bundling diagnostics on failure.
      - name: Verify deployment (structured report)
        run: |
          python3 scripts/verify_install.py \
            --target docker --container cw-smoke \
            --base-url http://127.0.0.1:18888 \
            --output verify-docker.json --json

      - name: Cleanup
        if: always()
        run: docker rm -f cw-smoke 2>/dev/null || true

  linux-entrypoint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cw-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/cw-image.tar

      - name: Test CLI --help
        run: docker run --rm cert-watch-deploy-test:smoke --help

      - name: Run on host network
        run: |
          docker run -d --name cw-linux \
            --network host \
            -e CERT_WATCH_HOST=127.0.0.1 \
            -e CERT_WATCH_PORT=18891 \
            -e CERT_WATCH_ALLOW_UNAUTH=1 \
            cert-watch-deploy-test:smoke \
            --host 127.0.0.1 --port 18891

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18891/healthz | grep -q '"ok"'; then
              echo "healthz OK"
              exit 0
            fi
            sleep 2
          done
          echo "healthz never returned OK"
          docker logs cw-linux
          exit 1

      # HTTP-only target: this container serves on 18891 while the image's baked
      # HEALTHCHECK probes 8000, so the docker healthcheck check does not apply
      # here -- assert the served endpoints instead.
      - name: Verify deployment (structured report)
        run: |
          python3 scripts/verify_install.py \
            --target http \
            --base-url http://127.0.0.1:18891 \
            --output verify-linux.json --json

      - name: Cleanup
        if: always()
        run: docker rm -f cw-linux 2>/dev/null || true

  k8s:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cw-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/cw-image.tar

      - name: Install kind
        run: |
          KIND_VERSION="v0.27.0"
          KIND_URL="https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          CHECKSUMS_URL="https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64.sha256sum"
          curl -sSL -o /usr/local/bin/kind "$KIND_URL"
          curl -sSL -o /tmp/kind-checksum.txt "$CHECKSUMS_URL"
          EXPECTED=$(awk '{print $1}' /tmp/kind-checksum.txt)
          ACTUAL=$(sha256sum /usr/local/bin/kind | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "kind checksum mismatch: expected $EXPECTED, got $ACTUAL"
            exit 1
          fi
          chmod +x /usr/local/bin/kind

      - name: Create kind cluster
        run: kind create cluster --name cert-watch-deploy-test --wait 120s --retain

      - name: Load image into kind
        run: kind load docker-image cert-watch-deploy-test:smoke --name cert-watch-deploy-test

      - name: Deploy
        run: |
          NS=cert-watch-deploy-test
          kubectl create namespace "$NS"

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: cert-watch-secrets
            namespace: $NS
          type: Opaque
          stringData:
            csrf-secret: "test-deploy-smoke-csrf"
            auth-secret: "test-deploy-smoke-auth"
          EOF

          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cert-watch
            namespace: $NS
            labels:
              app.kubernetes.io/name: cert-watch
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app.kubernetes.io/name: cert-watch
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: cert-watch
              spec:
                enableServiceLinks: false
                securityContext:
                  fsGroup: 999
                containers:
                  - name: cert-watch
                    image: cert-watch-deploy-test:smoke
                    imagePullPolicy: Never
                    securityContext:
                      runAsNonRoot: true
                      runAsUser: 999
                      runAsGroup: 999
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                        drop: ["ALL"]
                    ports:
                      - name: http
                        containerPort: 8000
                    env:
                      - name: CERT_WATCH_DATA_DIR
                        value: /var/lib/cert-watch
                      - name: CERT_WATCH_CSRF_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: cert-watch-secrets
                            key: csrf-secret
                      - name: CERT_WATCH_ALLOW_UNAUTH
                        value: "1"
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: http
                      initialDelaySeconds: 3
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: http
                      initialDelaySeconds: 15
                      periodSeconds: 30
                    resources:
                      requests:
                        cpu: 25m
                        memory: 64Mi
                      limits:
                        cpu: 500m
                        memory: 256Mi
                    volumeMounts:
                      - name: data
                        mountPath: /var/lib/cert-watch
                      - name: tmp
                        mountPath: /tmp
                volumes:
                  - name: data
                    emptyDir: {}
                  - name: tmp
                    emptyDir: {}
          EOF

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: cert-watch
            namespace: $NS
          spec:
            selector:
              app.kubernetes.io/name: cert-watch
            ports:
              - name: http
                port: 80
                targetPort: http
          EOF

      - name: Wait for pod ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=cert-watch \
            -n cert-watch-deploy-test --timeout=180s

      - name: Verify /healthz via port-forward
        run: |
          kubectl port-forward service/cert-watch 18889:80 -n cert-watch-deploy-test &
          PF_PID=$!
          sleep 5
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:18889/healthz | grep -q '"ok"'; then
              echo "healthz OK"
              kill $PF_PID 2>/dev/null
              exit 0
            fi
            sleep 2
          done
          echo "healthz failed via port-forward"
          kill $PF_PID 2>/dev/null
          kubectl logs -l app.kubernetes.io/name=cert-watch -n cert-watch-deploy-test
          exit 1

      - name: Verify /readyz via port-forward
        run: |
          kubectl port-forward service/cert-watch 18889:80 -n cert-watch-deploy-test &
          PF_PID=$!
          sleep 5
          for i in $(seq 1 15); do
            body=$(curl -sf http://127.0.0.1:18889/readyz)
            if echo "$body" | grep -q '"database".*"ok"'; then
              echo "readyz OK: $body"
              kill $PF_PID 2>/dev/null
              exit 0
            fi
            sleep 2
          done
          echo "readyz failed"
          kill $PF_PID 2>/dev/null
          exit 1

      # Structured assertion: the kubectl-side checks (deployment, replicas,
      # rollout, pod restarts, signing-secret object) need no port-forward; the
      # HTTP checks do, so we forward for the duration of the run.
      - name: Verify deployment (structured report)
        run: |
          kubectl port-forward service/cert-watch 18889:80 -n cert-watch-deploy-test &
          PF_PID=$!
          sleep 5
          set +e
          python3 scripts/verify_install.py \
            --target k8s --namespace cert-watch-deploy-test --deployment cert-watch \
            --base-url http://127.0.0.1:18889 \
            --output verify-k8s.json --json
          rc=$?
          kill $PF_PID 2>/dev/null || true
          exit $rc

      - name: Cleanup
        if: always()
        run: |
          kubectl delete namespace cert-watch-deploy-test --ignore-not-found=true --wait=false || true
          kind delete cluster --name cert-watch-deploy-test || true

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Parse both PS scripts on Windows PowerShell 5.1 (the production shell, not
      # pwsh 7) to catch the 5.1-only syntax / quoting-codepage class of bug
      # before anything runs.
      - name: Parse PowerShell scripts on Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($f in @('scripts\install-windows.ps1', 'scripts\Verify-Install.ps1')) {
            $errs = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $f).Path, [ref]$null, [ref]$errs)
            if ($errs -and $errs.Count -gt 0) {
              $errs | ForEach-Object { Write-Host ('PARSE ERROR line ' + $_.Extent.StartLineNumber + ': ' + $_.Message) }
              exit 1
            }
            Write-Host ('parsed OK: ' + $f)
          }

      # Service model (no IIS -- IIS is not enabled on hosted runners; the
      # verifier skips the IIS/ACL checks). This exercises the real install
      # script end to end via Windows PowerShell 5.1.
      - name: Install cert-watch via install-windows.ps1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $py312 = Get-ChildItem 'C:\hostedtoolcache\windows\Python\3.12.*' -Directory -ErrorAction SilentlyContinue |
            Sort-Object Name -Descending | Select-Object -First 1
          if ($py312) { $env:PATH = (Join-Path $py312.FullName 'x64') + ';' + $env:PATH }
          python --version
          .\scripts\install-windows.ps1 -InstallDir C:\cert-watch-ci

      - name: Start app on loopback and wait for health
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CERT_WATCH_DATA_DIR = 'C:\cert-watch-ci'
          $env:CERT_WATCH_HOST = '127.0.0.1'
          $env:CERT_WATCH_PORT = '18890'
          $env:CERT_WATCH_ALLOW_UNAUTH = '1'
          $env:CERT_WATCH_AUTH_SECRET_FILE = 'C:\cert-watch-ci\secrets\auth_secret'
          $env:CERT_WATCH_CSRF_SECRET_FILE = 'C:\cert-watch-ci\secrets\csrf_secret'
          $exe = 'C:\cert-watch-ci\venv\Scripts\cert-watch.exe'
          $p = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          $p.Id | Set-Content cw.pid
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing -TimeoutSec 3 http://127.0.0.1:18890/healthz
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { }
            Start-Sleep -Seconds 2
          }
          if (-not $ok) {
            Write-Host '--- app log tail ---'
            Get-ChildItem C:\cert-watch-ci\logs -ErrorAction SilentlyContinue |
              ForEach-Object { Get-Content $_.FullName -Tail 50 }
            throw 'cert-watch did not become healthy on 127.0.0.1:18890'
          }

      # Gate of record: the same verifier operators run by hand. Exits non-zero
      # on any failed check and prints verify-report.json via -Json.
      - name: Verify deployment (structured report)
        shell: powershell
        run: |
          .\scripts\Verify-Install.ps1 -InstallDir C:\cert-watch-ci -BaseUrl http://127.0.0.1:18890 -Json

      - name: Stop app
        if: always()
        shell: powershell
        run: |
          if (Test-Path cw.pid) {
            Stop-Process -Id (Get-Content cw.pid) -Force -ErrorAction SilentlyContinue
          }
