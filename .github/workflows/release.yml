name: release
on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/k8s/kustomization.yaml'
      - 'deploy/k8s-demo/kustomization.yaml'
      - '**.md'
      - 'docs/**'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Compute tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/cert-watch:latest
            ghcr.io/${{ github.repository_owner }}/cert-watch:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "ghcr.io/${{ github.repository_owner }}/cert-watch:${{ steps.tag.outputs.tag }}"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

      - name: Bump kustomize image tag
        run: |
          curl -sSL -o /tmp/kustomize.tgz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tgz -C /tmp
          for dir in deploy/k8s deploy/k8s-demo; do
            cd "$GITHUB_WORKSPACE/$dir"
            /tmp/kustomize edit set image ghcr.io/${{ github.repository_owner }}/cert-watch=ghcr.io/${{ github.repository_owner }}/cert-watch:${{ steps.tag.outputs.tag }}
          done

      - name: Commit tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No image change to commit."
            exit 0
          fi
          git add deploy/k8s/kustomization.yaml deploy/k8s-demo/kustomization.yaml
          git commit -m "chore(deploy): bump image to ${{ steps.tag.outputs.tag }}"
          git push
