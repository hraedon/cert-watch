name: e2e
on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          python-version: "3.13"
      - run: uv pip install -e ".[dev,e2e]"
      - name: Install Playwright browsers + OS deps
        run: .venv/bin/playwright install --with-deps chromium
      - name: Run functional E2E tests
        # `-n0` overrides the addopts default (`-n auto`): the E2E suite drives a
        # single app instance on a fixed port and is not parallel-safe. Visual
        # tests run in their own (non-blocking) job below.
        run: .venv/bin/pytest -m "e2e and not visual" tests/e2e -q --no-cov -n0

  visual:
    runs-on: ubuntu-latest
    # Required gate: the committed baselines have matched ubuntu-latest across
    # multiple runs at the configured 0.2 threshold (v0.6.5 review), so a visual
    # diff is a real regression signal, not runner noise. On a deliberate UI
    # change, re-baseline with `pytest -m visual --update-snapshots` and commit.
    # If a runner-image change ever causes drift, drop back to continue-on-error
    # and re-baseline. Diffs are uploaded as an artifact below on failure.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          python-version: "3.13"
      - run: uv pip install -e ".[dev,e2e]"
      - name: Install Playwright browsers + OS deps
        run: .venv/bin/playwright install --with-deps chromium
      - name: Run visual-regression tests
        run: .venv/bin/pytest -m visual tests/e2e -q --no-cov -n0
      - name: Upload visual diffs on mismatch
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-snapshot-diffs
          path: snapshot_failures/**
          if-no-files-found: ignore
