apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-watch-demo
  namespace: cert-watch-demo
  labels:
    app.kubernetes.io/name: cert-watch-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-watch-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-watch-demo
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 999
      containers:
        - name: cert-watch
          image: ghcr.io/hraedon/cert-watch:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CERT_WATCH_DATA_DIR
              value: /var/lib/cert-watch
            - name: CERT_WATCH_CSRF_SECRET
              valueFrom:
                secretKeyRef:
                  name: cert-watch-demo-secrets
                  key: csrf-secret
            - name: CERT_WATCH_ALLOW_PRIVATE_IPS
              value: "1"
            - name: CERT_WATCH_DNS_SERVERS
              value: "192.168.1.29,192.168.1.19"
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/cert-watch
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cert-watch-demo-data
        - name: tmp
          emptyDir: {}
