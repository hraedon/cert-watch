services:
  cert-watch:
    image: ghcr.io/hraedon/cert-watch:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: cert-watch
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - cert-watch-data:/var/lib/cert-watch
    environment:
      CERT_WATCH_DATA_DIR: /var/lib/cert-watch
      # --- First run (secure-by-default) ---
      # The container binds 0.0.0.0 (network-exposed), so on first run cert-watch
      # auto-provisions an 'admin' with a generated password and comes up
      # authenticated. Grab it from `docker compose logs` or the data volume file
      # /var/lib/cert-watch/initial-admin-password. For production, configure a
      # provider below instead of relying on the generated credential.
      # To intentionally run open (dev only): CERT_WATCH_ALLOW_UNAUTH: "1"
      # --- Scanning options ---
      # CERT_WATCH_ALLOW_PRIVATE_IPS: "1"
      # --- Secrets: set fixed values in production to survive restarts ---
      # CERT_WATCH_CSRF_SECRET: change-me-in-production
      # CERT_WATCH_AUTH_SECRET: change-me-in-production
      # --- Alerts (SMTP) — uncomment and fill in to enable ---
      # SMTP_HOST: smtp.example.com
      # SMTP_PORT: "587"
      # SMTP_USER: ""
      # SMTP_PASSWORD: ""
      # ALERT_FROM: cert-watch@example.com
      # ALERT_RECIPIENTS: ops@example.com
      # --- Alerts (Webhook) ---
      # ALERT_WEBHOOK_URL: https://hooks.slack.com/services/...
      # --- Authentication (configure one of these to run securely) ---
      # AUTH_PROVIDER: ldap            # or: oauth, entra
      # LDAP_SERVER: ldap://dc.example.com
      # LDAP_BASE_DN: DC=example,DC=com
      # LDAP_BIND_DN: CN=svc,DC=example,DC=com
      # LDAP_BIND_PASSWORD: secret
      # OAUTH_CLIENT_ID: ""
      # OAUTH_CLIENT_SECRET: ""
      # OAUTH_ISSUER_URL: https://login.microsoftonline.com/{tenant}/v2.0
      # Or a local admin (leave AUTH_PROVIDER unset): generate the hash with
      # `cert-watch hash-password`.
      # CERT_WATCH_LOCAL_ADMIN_USER: admin
      # CERT_WATCH_LOCAL_ADMIN_PASSWORD_HASH: scrypt$...

volumes:
  cert-watch-data:
