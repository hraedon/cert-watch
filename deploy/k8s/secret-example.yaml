apiVersion: v1
kind: Secret
metadata:
  name: cert-watch-secrets
  namespace: cert-watch
type: Opaque
stringData:
  # WARNING: This is an EXAMPLE file. Replace ALL placeholder values before applying.
  # Generate real secrets with:  openssl rand -hex 32
  # Applying this file as-is will deploy with known/insecure keys.
  #
  # DO NOT commit real secrets to git. For production, create secrets with:
  #   kubectl create secret generic cert-watch-secrets \
  #     --from-literal=csrf-secret=$(openssl rand -hex 32) \
  #     --from-literal=auth-secret=$(openssl rand -hex 32)
  # Or use a Sealed Secret (bitnami-labs/sealed-secrets) or External Secrets Operator.
  csrf-secret: "REPLACE-ME-32-BYTES-HEX"
  auth-secret: "REPLACE-ME-32-BYTES-HEX"
