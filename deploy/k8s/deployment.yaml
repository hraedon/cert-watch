apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-watch
  namespace: cert-watch
  labels:
    app.kubernetes.io/name: cert-watch
spec:
  replicas: 1
  strategy:
    type: Recreate  # sqlite single-writer
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-watch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-watch
    spec:
      enableServiceLinks: false  # avoid CERT_WATCH_PORT=tcp://... shadowing our env
      securityContext:
        fsGroup: 999
      containers:
        - name: cert-watch
          image: ghcr.io/hraedon/cert-watch:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CERT_WATCH_DATA_DIR
              value: /var/lib/cert-watch
            - name: CERT_WATCH_CSRF_SECRET
              valueFrom:
                secretKeyRef:
                  name: cert-watch-secrets
                  key: csrf-secret
            - name: CERT_WATCH_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: cert-watch-secrets
                  key: auth-secret
            # --- Alerts (SMTP) — uncomment to enable ---
            # - name: SMTP_HOST
            #   value: smtp.example.com
            # - name: ALERT_FROM
            #   value: cert-watch@example.com
            # - name: ALERT_RECIPIENTS
            #   value: ops@example.com
            # --- Alerts (Webhook) ---
            # - name: ALERT_WEBHOOK_URL
            #   value: https://hooks.slack.com/services/...
            # --- Authentication (disabled by default) ---
            # - name: AUTH_PROVIDER
            #   value: ldap    # or: oauth, entra
            # - name: LDAP_SERVER
            #   value: ldap://dc.example.com
            # - name: LDAP_BASE_DN
            #   value: DC=example,DC=com
            # - name: LDAP_BIND_DN
            #   value: CN=svc,DC=example,DC=com
            # - name: LDAP_BIND_PASSWORD
            #   valueFrom:
            #     secretKeyRef:
            #       name: cert-watch-auth
            #       key: ldap-bind-password
            # - name: OAUTH_CLIENT_ID
            #   valueFrom:
            #     secretKeyRef:
            #       name: cert-watch-auth
            #       key: oauth-client-id
            # - name: OAUTH_CLIENT_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: cert-watch-auth
            #       key: oauth-client-secret
            # - name: OAUTH_ISSUER_URL
            #   value: https://login.microsoftonline.com/{tenant}/v2.0
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/cert-watch
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cert-watch-data
        - name: tmp
          emptyDir: {}
