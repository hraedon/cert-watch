apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-watch
  namespace: cert-watch
  labels:
    app.kubernetes.io/name: cert-watch
spec:
  replicas: 1
  strategy:
    type: Recreate  # sqlite single-writer
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-watch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-watch
    spec:
      enableServiceLinks: false  # avoid CERT_WATCH_PORT=tcp://... shadowing our env
      securityContext:
        fsGroup: 999
      containers:
        - name: cert-watch
          image: ghcr.io/hraedon/cert-watch:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: CERT_WATCH_DATA_DIR
              value: /var/lib/cert-watch
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/cert-watch
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cert-watch-data
