<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cert-watch — redesign explorations</title>
<style>
  html, body { margin: 0; height: 100%; background: #0c0e12; }
  #root { height: 100vh; }
  /* notes card styling (reuses cw tokens via the .cw wrapper inside) */
  .note-h { font-size: 19px; font-weight: 600; letter-spacing: -.4px; margin: 0; }
  .note-section-title { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); margin: 0 0 9px; }
  .note-p { font-size: 13px; line-height: 1.6; color: var(--text-2); margin: 0 0 10px; }
  .note-p b { color: var(--text); font-weight: 600; }
  .note-li { display: flex; gap: 9px; font-size: 12.5px; line-height: 1.55; color: var(--text-2); margin-bottom: 9px; }
  .note-li .k { flex: 0 0 auto; width: 7px; height: 7px; border-radius: 4px; margin-top: 6px; }
  .note-li b { color: var(--text); font-weight: 600; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="cw-data.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="cw-shared.jsx"></script>
<script type="text/babel" src="cw-dashboards.jsx"></script>
<script type="text/babel" src="cw-detail.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, Icon } = window;

function Dot({ c }) { return <span className="k" style={{ background: c }} />; }

function Notes() {
  return (
    <div className="cw cw-dark" style={{ height: '100%', overflow: 'auto', padding: '30px 32px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 11, marginBottom: 6 }}>
        <div className="cw-mark" style={{ width: 32, height: 32 }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l7 3v6c0 4.5-3 8.3-7 9.5C8 19.3 5 15.5 5 11V5l7-3z"/><path d="M9 12l2 2 4-4"/></svg>
        </div>
        <h1 className="note-h">cert·watch — front-end redesign</h1>
      </div>
      <p className="note-p" style={{ marginBottom: 22 }}>Three directions for the dashboard, plus a detail view and a light-mode sample. Same data, same features as today — just rebuilt around a modern infra-tool aesthetic. Every board is live: <b>toggle dark/light</b> in the top-right, hover rows, sort &amp; filter in Direction A.</p>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '24px 34px' }}>
        <div>
          <p className="note-section-title">The system</p>
          <div className="note-li"><Dot c="var(--accent)" /><span><b>Type:</b> IBM Plex Sans for UI, IBM Plex Mono for every cert identity, date, serial &amp; fingerprint — mono makes hostnames and hex scannable.</span></div>
          <div className="note-li"><Dot c="var(--accent)" /><span><b>Color:</b> cool near-black surfaces, one indigo accent, semantic green / amber / red tuned for dark. Light theme mirrors it.</span></div>
          <div className="note-li"><Dot c="var(--accent)" /><span><b>Density:</b> balanced — comfortable rows, summary stat cards up top.</span></div>
        </div>
        <div>
          <p className="note-section-title">The big fix — the table</p>
          <div className="note-li"><Dot c="var(--ok)" /><span>Lead with the <b>common name</b> + <b>SAN chips</b> (the names a cert actually covers) instead of dumping the full Distinguished Name.</span></div>
          <div className="note-li"><Dot c="var(--ok)" /><span>Issuer collapses to <b>“Let's Encrypt · R11”</b> + key type.</span></div>
          <div className="note-li"><Dot c="var(--ok)" /><span>The raw DN, serial &amp; fingerprint move to the <b>detail view</b>, where there's room.</span></div>
        </div>
        <div>
          <p className="note-section-title">The three directions</p>
          <div className="note-li"><Dot c="var(--text-3)" /><span><b>A · Refined table</b> — closest to today: sortable, filterable, status pills + tiny expiry bars. Safe, fast, scales.</span></div>
          <div className="note-li"><Dot c="var(--text-3)" /><span><b>B · Timeline-forward</b> — a 90-day expiration timeline leads the page; everything plotted by urgency at a glance, table below.</span></div>
          <div className="note-li"><Dot c="var(--text-3)" /><span><b>C · Urgency board</b> — Kanban-style lanes (Expired → Healthy); great for an always-on monitor.</span></div>
        </div>
        <div>
          <p className="note-section-title">Using this canvas</p>
          <div className="note-li"><Dot c="var(--warn)" /><span>Scroll / pinch to pan &amp; zoom. <b>Click any board's ⤢</b> to open it fullscreen, then ←/→ to step through.</span></div>
          <div className="note-li"><Dot c="var(--warn)" /><span>Drag the grip to reorder; the ⋯ menu deletes a board you've ruled out.</span></div>
          <div className="note-li"><Dot c="var(--warn)" /><span>Tell me what you like &amp; dislike — we'll merge the winners into one and refine.</span></div>
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="notes" title="Start here" subtitle="Brief, system & how to drive this canvas">
        <DCArtboard id="notes" label="Design notes" width={820} height={540} style={{ background: '#0c0e12' }}>
          <Notes />
        </DCArtboard>
      </DCSection>

      <DCSection id="dash" title="Dashboard — three directions" subtitle="Dark · IBM Plex · identical data & features">
        <DCArtboard id="A" label="A · Refined table" width={1340} height={1060} style={{ background: '#0c0e12' }}>
          <window.DirectionA />
        </DCArtboard>
        <DCArtboard id="B" label="B · Timeline-forward" width={1340} height={1140} style={{ background: '#0c0e12' }}>
          <window.DirectionB />
        </DCArtboard>
        <DCArtboard id="C" label="C · Urgency board" width={1340} height={780} style={{ background: '#0c0e12' }}>
          <window.DirectionC />
        </DCArtboard>
      </DCSection>

      <DCSection id="detail" title="Certificate detail" subtitle="Where SANs, the chain & the full DN finally get room">
        <DCArtboard id="D" label="Detail view" width={1180} height={1040} style={{ background: '#0c0e12' }}>
          <window.CertDetail />
        </DCArtboard>
      </DCSection>

      <DCSection id="light" title="Light mode" subtitle="Same system — the toggle lives in every board's top bar">
        <DCArtboard id="L" label="A · Light theme" width={1340} height={1060} style={{ background: '#f3f4f7' }}>
          <window.DirectionA initialTheme="light" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#0c0e12"/><g transform="translate(50 50)"><path d="M0 -22l19 8v15c0 12-8 22-19 25-11-3-19-13-19-25v-15l19-8z" fill="none" stroke="#7c8cff" stroke-width="4" stroke-linejoin="round"/><path d="M-9 0l6 6 12-12" fill="none" stroke="#34d399" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/></g></svg>
</template>
</body>
</html>
